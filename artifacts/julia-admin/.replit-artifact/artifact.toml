kind = "web"
previewPath = "/"
title = "Júlia Admin"
version = "1.0.0"
id = "artifacts/julia-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20709

[services.development]
run = "pnpm --filter @workspace/julia-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/julia-admin", "run", "build" ]
publicDir = "artifacts/julia-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20709"
BASE_PATH = "/"
